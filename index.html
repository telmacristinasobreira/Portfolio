<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Portfólio</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<div id="root"></div>

<script type="module">
import React, { useState } from "https://esm.sh/react@19";
import ReactDOM from "https://esm.sh/react-dom@19/client";

const App = () => {
  const [secao, setSecao] = useState('perfil');

  return (
    <div>
      <header>
        <h1>Eduardo Filipe Bonifácio</h1>

        <nav>
          <button onClick={() => setSecao('perfil')}>SOBRE</button>
          <button onClick={() => setSecao('projetos')}>PROJETOS</button>
        </nav>
      </header>

      <div className="card">
        {secao === 'perfil' && <h2>Sobre</h2>}
        {secao === 'projetos' && <h2>Projetos</h2>}
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
