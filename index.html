<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Eduardo Araújo</title>
    <!-- Ícones Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Bibliotecas React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
          const [secao, setSecao] = useState('perfil');
          const [dark, setDark] = useState(false);
          const [depoimentos, setDepoimentos] = useState([
            { nome: "Equipe Técnica", texto: "O Eduardo é um profissional extremamente dedicado!" }
          ]);
          const [novoNome, setNovoNome] = useState("");
          const [novoTexto, setNovoTexto] = useState("");

          const dados = {
            nome: "Eduardo Filipe B. de Araújo",
            cargo: "Engenheiro Eletricista | Analista de Processos Industriais",
            foto: "https://media.licdn.com/dms/image/v2/C4D03AQGF04xwpKSAdw/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1663639643646?e=1777507200&v=beta&t=1UT263VsbBl1BPXaAzMtrKpwm8eM-zZ_qXWO9beaiew", 
            whatsapp: "5592992140488", 
            email: "engeduardofilipe@gmail.com",
            skills: [
              { nome: "Engenharia", icone: "fas fa-bolt", cor: "#f1c40f" },
              { nome: "Processos", icone: "fas fa-industry", cor: "#2980b9" },
              { nome: "Segurança", icone: "fas fa-hard-hat", cor: "#e67e22" },
              { nome: "Gestão", icone: "fas fa-tasks", cor: "#3498db" }
            ],
            projetos: [
              { nome: "Otimização Industrial", desc: "Melhoria de processos produtivos e redução de desperdícios." },
              { nome: "Gestão de CIPA", desc: "Implementação de normas de segurança e treinamentos NR." },
              { nome: "Automação Técnica", desc: "Manutenção e configuração de sistemas elétricos." }
            ],
            formacao: [
              { nome: "Engenharia Elétrica", local: "Bacharelado Completo", status: "Concluído" },
              { nome: "Pós: Cronoanálise", local: "Análise de Processos Industriais", status: "Concluído" },
              { nome: "Certificação: NR-10", local: "Segurança em Eletricidade", status: "Certificado" }
            ]
          };

          const toggleDark = () => {
            setDark(!dark);
            document.body.classList.toggle('dark-mode');
          };

          const enviarRecado = (e) => {
            e.preventDefault();
            if (novoNome && novoTexto) {
              setDepoimentos([{ nome: novoNome, texto: novoTexto }, ...depoimentos]);
              setNovoNome(""); setNovoTexto("");
            }
          };

          const BotaoVoltar = () => (
            <button onClick={() => setSecao('perfil')} className="back-btn">
              <i className="fas fa-arrow-left"></i> Voltar ao Início
            </button>
          );

          return (
            <div>
              <header>
                <button onClick={toggleDark} className="dark-toggle">
                  <i className={dark ? "fas fa-sun" : "fas fa-moon"}></i>
                </button>
                <img src={dados.foto} alt={dados.nome} className="profile-photo" />
                <h1>{dados.nome}</h1>
                <p>{dados.cargo}</p>
                <nav>
                  <button className={`nav-link ${secao === 'perfil' ? 'active' : ''}`} onClick={() => setSecao('perfil')}>SOBRE</button>
                  <button className={`nav-link ${secao === 'projetos' ? 'active' : ''}`} onClick={() => setSecao('projetos')}>PROJETOS</button>
                  <button className={`nav-link ${secao === 'certs' ? 'active' : ''}`} onClick={() => setSecao('certs')}>FORMAÇÃO</button>
                  <button className={`nav-link ${secao === 'mural' ? 'active' : ''}`} onClick={() => setSecao('mural')}>MURAL</button>
                </nav>
              </header>

              <main className="card">
                {secao === 'perfil' && (
                  <div>
                    <h2>Resumo Profissional</h2>
                    <p style={{textAlign: 'justify'}}>Engenheiro Eletricista focado na otimização de processos industriais e engenharia de manufatura.</p>
                    <p><strong>Contato:</strong> {dados.email}</p>
                    <div style={{display: 'flex', justifyContent: 'center', gap: '20px', marginTop: '20px', flexWrap: 'wrap'}}>
                      {dados.skills.map((s, i) => (
                        <div key={i} style={{textAlign: 'center', width: '80px'}}>
                          <i className={s.icone} style={{fontSize: '2.5em', color: s.cor, display: 'block'}}></i>
                          <span style={{fontSize: '0.7em', fontWeight: 'bold'}}>{s.nome}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {secao === 'projetos' && (
                  <div>
                    <h2>Projetos e Realizações</h2>
                    {dados.projetos.map((p, i) => (
                      <div key={i} className="item-card">
                        <h3>{p.nome}</h3>
                        <p>{p.desc}</p>
                      </div>
                    ))}
                    <BotaoVoltar />
                  </div>
                )}

                {secao === 'certs' && (
                  <div>
                    <h2>Certificações e Formação</h2>
                    {dados.formacao.map((f, i) => (
                      <div key={i} className="item-card">
                        <div style={{display: 'flex', justifyContent: 'space-between'}}>
                          <strong>{f.nome}</strong>
                          <span className="status-tag">{f.status}</span>
                        </div>
                        <p>{f.local}</p>
                      </div>
                    ))}
                    <BotaoVoltar />
                  </div>
                )}

                {secao === 'mural' && (
                  <div>
                    <h2>Mural de Recados</h2>
                    <form onSubmit={enviarRecado} className="mural-form">
                      <input placeholder="Seu nome" value={novoNome} onChange={(e) => setNovoNome(e.target.value)} required />
                      <textarea placeholder="Sua mensagem" value={novoTexto} onChange={(e) => setNovoTexto(e.target.value)} rows="3" required />
                      <button type="submit" className="btn-post">Publicar Recado</button>
                    </form>
                    {depoimentos.map((d, i) => (
                      <div key={i} className="item-card">
                        <p>"{d.texto}"</p>
                        <small>— <strong>{d.nome}</strong></small>
                      </div>
                    ))}
                    <BotaoVoltar />
                  </div>
                )}
              </main>

              <a href={`https://wa.me/${dados.whatsapp}`} className="whatsapp-btn" target="_blank">
                <i className="fab fa-whatsapp"></i>
              </a>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
