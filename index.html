<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Eduardo Araújo</title>
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Link para o CSS que vamos criar -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Bibliotecas de Scripts Estáveis -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
          const [secao, setSecao] = useState('perfil');

          const dados = {
            nome: "Eduardo Filipe B. de Araújo",
            cargo: "Engenheiro Eletricista | Analista de Processos",
            foto: "https://media.licdn.com/dms/image/v2/C4D03AQGF04xwpKSAdw/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1663639643646?e=1777507200&v=beta&t=1UT263VsbBl1BPXaAzMtrKpwm8eM-zZ_qXWO9beaiew", 
            whatsapp: "5592992140488", 
            email: "engeduardofilipe@gmail.com",
            projetos: [
              { nome: "Otimização de Processos", desc: "Estratégias para ganho de produtividade e redução de custos." },
              { nome: "Gestão de Segurança", desc: "Condução de CIPA e Diálogos Semanais de Segurança (DSS)." },
              { nome: "Automação Técnica", desc: "Manutenção e configuração de sistemas automatizados." }
            ],
            formacao: [
              { nome: "Engenharia Elétrica", local: "Bacharelado", status: "Concluído" },
              { nome: "NR-10 / NR-35", local: "Segurança do Trabalho", status: "Certificado" },
              { nome: "Cronoanálise", local: "Especialista", status: "Certificado" }
            ]
          };

          const BotaoVoltar = () => (
            <button onClick={() => setSecao('perfil')} className="back-btn">
              <i className="fas fa-arrow-left"></i> Voltar ao Início
            </button>
          );

          return (
            <div>
              <header>
                <img src={dados.foto} alt={dados.nome} className="profile-photo" />
                <h1>{dados.nome}</h1>
                <p>{dados.cargo}</p>
                <nav>
                  <button className={`nav-link ${secao === 'perfil' ? 'active' : ''}`} onClick={() => setSecao('perfil')}>SOBRE</button>
                  <button className={`nav-link ${secao === 'projetos' ? 'active' : ''}`} onClick={() => setSecao('projetos')}>PROJETOS</button>
                  <button className={`nav-link ${secao === 'certs' ? 'active' : ''}`} onClick={() => setSecao('certs')}>FORMAÇÃO</button>
                </nav>
              </header>

              <main className="card">
                {secao === 'perfil' && (
                  <div>
                    <h2>Resumo Profissional</h2>
                    <p>Engenheiro Eletricista focado em resultados de alta performance na Engenharia Industrial. Especialista em identificar gargalos e implementar melhorias operacionais.</p>
                    <div className="info-box">
                        <strong>Contatos:</strong>
                        <p><i className="fas fa-envelope"></i> {dados.email}</p>
                    </div>
                  </div>
                )}

                {secao === 'projetos' && (
                  <div>
                    <h2>Projetos e Realizações</h2>
                    {dados.projetos.map((p, i) => (
                      <div key={i} className="item-card">
                        <h3>{p.nome}</h3>
                        <p>{p.desc}</p>
                      </div>
                    ))}
                    <BotaoVoltar />
                  </div>
                )}

                {secao === 'certs' && (
                  <div>
                    <h2>Formação e Certificações</h2>
                    {dados.formacao.map((f, i) => (
                      <div key={i} className="item-card">
                        <strong>{f.nome}</strong>
                        <p>{f.local} - <span className="status-tag">{f.status}</span></p>
                      </div>
                    ))}
                    <BotaoVoltar />
                  </div>
                )}
              </main>

              <a href={`https://wa.me/${dados.whatsapp}`} className="whatsapp-btn" target="_blank">
                <i className="fab fa-whatsapp"></i>
              </a>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
