<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio | Eduardo Araújo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
          const [secao, setSecao] = useState('perfil');
          const [depoimentos, setDepoimentos] = useState([
            { nome: "Equipe de Engenharia", texto: "O Eduardo demonstra grande domínio em otimização." }
          ]);
          const [novoNome, setNovoNome] = useState("");
          const [novoTexto, setNovoTexto] = useState("");

          const dados = {
            nome: "Eduardo Filipe Bonifácio de Araújo",
            cargo: "Engenheiro Eletricista ⚡ | Analista de Processos",
            foto: "https://media.licdn.com/dms/image/v2/C4D03AQGF04xwpKSAdw/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1663639643646?e=1777507200&v=beta&t=1UT263VsbBl1BPXaAzMtrKpwm8eM-zZ_qXWO9beaiew", 
            whatsapp: "5592992140488", 
            email: "engeduardofilipe@gmail.com",
            projetos: [
              { titulo: "Otimização de Processos de Manufatura", desc: "Estratégias para ganho de produtividade e redução de custos." },
              { titulo: "Gestão de Segurança e CIPA", desc: "Condução de avaliações de riscos e melhorias operacionais." },
              { titulo: "Automação e Manutenção Técnica", desc: "Experiência em sistemas automatizados de alta complexidade." }
            ],
            certificados: [
              { nome: "Cronometragem e Cronoanálise", cat: "Especialista" },
              { nome: "NR 10 - Segurança em Eletricidade", cat: "Segurança" },
              { nome: "Inglês Avançado", cat: "Idiomas" }
            ]
          };

          const enviarRecado = (e) => {
            e.preventDefault();
            if (novoNome && novoTexto) {
              setDepoimentos([{ nome: novoNome, texto: novoTexto }, ...depoimentos]);
              setNovoNome(""); setNovoTexto("");
            }
          };

          const BotaoVoltar = () => (
            <button onClick={() => setSecao('perfil')} className="back-btn">
              <i className="fas fa-arrow-left"></i> Voltar ao Início
            </button>
          );

          return (
            <div>
              <header>
                <img src={dados.foto} alt={dados.nome} className="profile-photo" />
                <h1>{dados.nome}</h1>
                <p>{dados.cargo}</p>
                <nav>
                  <button className={`nav-link ${secao === 'perfil' ? 'active' : ''}`} onClick={() => setSecao('perfil')}>SOBRE</button>
                  <button className={`nav-link ${secao === 'projetos' ? 'active' : ''}`} onClick={() => setSecao('projetos')}>PROJETOS</button>
                  <button className={`nav-link ${secao === 'certs' ? 'active' : ''}`} onClick={() => setSecao('certs')}>CERTIFICAÇÕES</button>
                  <button className={`nav-link ${secao === 'mural' ? 'active' : ''}`} onClick={() => setSecao('mural')}>MURAL</button>
                </nav>
              </header>

              <main className="card">
                {secao === 'perfil' && (
                  <div>
                    <h2><i className="fas fa-star" style={{color: '#ffd700'}}></i> Bem-vindo!</h2>
                    <p>Atualmente, transformo dados e rotinas operacionais em resultados de alta performance na Engenharia Industrial.</p>
                    <div className="info-box">
                        <strong>Contato:</strong> {dados.email}
                    </div>
                  </div>
                )}

                {secao === 'projetos' && (
                  <div>
                    <h2><i className="fas fa-project-diagram"></i> Projetos</h2>
                    {dados.projetos.map((p, i) => (
                      <div key={i} className="item-card">
                        <strong>{p.titulo}</strong>
                        <p style={{fontSize: '0.9em', color: '#555'}}>{p.desc}</p>
                      </div>
                    ))}
                    <BotaoVoltar />
                  </div>
                )}

                {secao === 'certs' && (
                  <div>
                    <h2><i className="fas fa-award"></i> Certificações</h2>
                    {dados.certificados.map((c, i) => (
                      <div key={i} className="item-card">
                        <strong>{c.nome}</strong>
                        <div style={{color: '#2980b9', fontSize: '0.8em', fontWeight: 'bold'}}>{c.cat}</div>
                      </div>
                    ))}
                    <BotaoVoltar />
                  </div>
                )}
